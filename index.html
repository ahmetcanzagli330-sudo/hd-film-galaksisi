<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Film Galaksisi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#141414;
font-family:Arial,sans-serif;
color:white;
}

header{
background:#000;
padding:20px;
text-align:center;
}

header h1{
color:#e50914;
font-size:40px;
}

header p{
color:#ccc;
margin-top:10px;
}

.film-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(280px,1fr));
gap:25px;
padding:30px;
}

.film{
background:#222;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:.3s;
}

.film:hover{
transform:scale(1.05);
}

.film img{
width:100%;
height:420px;
object-fit:cover;
display:block;
}

.film-info{
padding:15px;
}

.film-info h3{
margin-bottom:10px;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,.95);
z-index:9999;
}

.modal-content{
width:85%;
max-width:1000px;
margin:40px auto;
}

.close{
font-size:40px;
cursor:pointer;
float:right;
color:white;
margin-bottom:10px;
}
</style>
</head>
<body>

<header>
<h1>HD Film Galaksisi</h1>
<p>Film Tanıtımları ve Fragmanlar</p>
</header>

<div class="film-grid">

<div class="film" onclick="openTrailer('Ki4haFrqSrw')">
<img src="yesilyol.jpg">
<div class="film-info">
<h3>Yeşil Yol</h3>
<p>IMDb: 8.6 • Dram</p>
</div>
</div>

<div class="film" onclick="openTrailer('NmzuHjWmXOc')">
<img src="esaretinbedeli.jpg">
<div class="film-info">
<h3>Esaretin Bedeli</h3>
<p>IMDb: 9.3 • Dram</p>
</div>
</div>

<div class="film" onclick="openTrailer('zSWdZVtXT7E')">
<img src="interstellar.jpg">
<div class="film-info">
<h3>Interstellar</h3>
<p>IMDb: 8.7 • Bilim Kurgu</p>
</div>
</div>

</div>

<div id="trailerModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeTrailer()">&times;</span>

<iframe
id="trailerFrame"
width="100%"
height="550"
src=""
frameborder="0"
allowfullscreen>
</iframe>

</div>
</div>

<script>
function openTrailer(videoId){
document.getElementById("trailerModal").style.display="block";
document.getElementById("trailerFrame").src =
"https://www.youtube.com/embed/" + videoId + "?autoplay=1";
}

function closeTrailer(){
document.getElementById("trailerModal").style.display="none";
document.getElementById("trailerFrame").src = "";
}
</script>

</body>
</html>
