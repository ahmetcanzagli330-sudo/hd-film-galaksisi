<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Film Galaksisi</title>

<style>
body{
    margin:0;
    font-family:Arial,sans-serif;
    background:#111;
    color:white;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
}

header h1{
    color:red;
}

main{
    padding:20px;
}

.film{
    background:#222;
    margin-bottom:20px;
    padding:15px;
    border-radius:10px;
}

button{
    background:red;
    color:white;
    border:none;
    padding:10px;
    border-radius:5px;
}
</style>
</head>

<body>

<header>
<h1>HD Film Galaksisi</h1>
<p>Film Önerileri ve Fragmanlar</p>
</header>

<main>

<div class="film">
<h2>Interstellar</h2>
<p>Tür: Bilim Kurgu</p>
<p>Yaş Sınırı: 13+</p>
<p>IMDB: 8.7</p>
<button>Fragman</button>
</div>

<div class="film">
<h2>Inception</h2>
<p>Tür: Bilim Kurgu</p>
<p>Yaş Sınırı: 13+</p>
<p>IMDB: 8.8</p>
<button>Fragman</button>
</div>

</main>

</body>
</html>
