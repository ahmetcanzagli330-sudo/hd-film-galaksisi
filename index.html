<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Film Galaksisi</title>
<style>
body{
font-family: Arial, sans-serif;
margin:0;
background:#f5f5f5;
}
header{
background:#0077cc;
color:white;
padding:20px;
text-align:center;
}
main{
max-width:1000px;
margin:auto;
padding:20px;
}
.film{
background:white;
padding:15px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 2px 5px rgba(0,0,0,0.1);
}
input{
width:100%;
padding:10px;
margin-bottom:20px;
font-size:16px;
}
</style>
</head>
<body>

<header>
<h1>HD Film Galaksisi</h1>
<p>Film önerileri ve incelemeleri</p>
</header>

<main>
<input type="text" placeholder="Film ara...">

<div class="film">
<h2>Interstellar</h2>
<p>Bilim kurgu ve uzay temalı bir klasik.</p>
</div>

<div class="film">
<h2>Inception</h2>
<p>Rüyalar içinde geçen sürükleyici bir film.</p>
</div>

<div class="film">
<h2>The Dark Knight</h2>
<p>Batman serisinin en sevilen yapımlarından biri.</p>
</div>

</main>

</body>
</html>
