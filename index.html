<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Film Galaksisi</title>

<style>
body{
    margin:0;
    background:#111;
    color:white;
    font-family:Arial,sans-serif;
}

header{
    background:#000;
    padding:20px;
    text-align:center;
}

header h1{
    color:red;
}

.film-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:20px;
    padding:20px;
}

.film{
    background:#222;
    border-radius:10px;
    overflow:hidden;
    cursor:pointer;
    transition:0.3s;
}

.film:hover{
    transform:scale(1.05);
}

.film img{
    width:100%;
    height:380px;
    object-fit:cover;
}

.film h3{
    text-align:center;
}

.modal{
    display:none;
    position:fixed;
    left:0;
    top:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.95);
}

.modal-content{
    width:80%;
    margin:50px auto;
}

.close{
    color:white;
    font-size:40px;
    float:right;
    cursor:pointer;
}
</style>
</head>

<body>

<header>
<h1>HD Film Galaksisi</h1>
<p>Film Önerileri ve Fragmanlar</p>
</header>

<div class="film-grid">

<div class="film" onclick="openTrailer('Ki4haFrqSrw')">
<img src="https://m.media-amazon.com/images/M/MV5BNDE3ODAxYTgtN2YzNC00Y2YwLTkwYmMtODc1ZGM0ZWU3YzY4XkEyXkFqcGc@._V1_.jpg">
<h3>Yeşil Yol</h3>
</div>

<div class="film" onclick="openTrailer('NmzuHjWmXOc')">
<img src="https://m.media-amazon.com/images/M/MV5BMDFkYTc0MGEtZmNhMC00ZDIzLWFmNTEtODM1ZmRlYWM4MWQxXkEyXkFqcGc@._V1_.jpg">
<h3>Esaretin Bedeli</h3>
</div>

<div class="film" onclick="openTrailer('zSWdZVtXT7E')">
<img src="https://m.media-amazon.com/images/M/MV5BZjdkOTU3MGUtYzQ0ZS00MmE5LWFhNzItMzg5Y2Q5MGM5Y2EzXkEyXkFqcGc@._V1_.jpg">
<h3>Interstellar</h3>
</div>

</div>

<div id="trailerModal" class="modal">
<div class="modal-content">
<span class="close" onclick="closeTrailer()">&times;</span>

<iframe
id="trailerFrame"
width="100%"
height="600"
src=""
frameborder="0"
allowfullscreen>
</iframe>

</div>
</div>

<script>
function openTrailer(videoId){
document.getElementById("trailerModal").style.display="block";
document.getElementById("trailerFrame").src=
"https://www.youtube.com/embed/"+videoId+"?autoplay=1";
}

function closeTrailer(){
document.getElementById("trailerModal").style.display="none";
document.getElementById("trailerFrame").src="";
}
</script>

</body>
</html>
