<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>HD Film Galaksisi</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#141414;
color:white;
font-family:Arial,sans-serif;
}

header{
background:black;
padding:20px;
text-align:center;
}

header h1{
color:#e50914;
font-size:40px;
}

header p{
color:#ccc;
margin-top:10px;
}

.film-grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(300px,1fr));
gap:25px;
padding:25px;
}

.film{
background:#222;
border-radius:12px;
overflow:hidden;
cursor:pointer;
transition:0.3s;
}

.film:hover{
transform:scale(1.05);
}

.film img{
width:100%;
height:450px;
object-fit:cover;
display:block;
}

.film h3{
text-align:center;
padding:15px;
}

.modal{
display:none;
position:fixed;
left:0;
top:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.95);
z-index:9999;
}

.modal-content{
width:85%;
max-width:1000px;
margin:40px auto;
}

.close{
color:white;
font-size:40px;
float:right;
cursor:pointer;
}

iframe{
width:100%;
height:600px;
border:none;
}
</style>
</head>

<body>

<header>
<h1>HD Film Galaksisi</h1>
<p>Film Fragmanları ve Bilgileri</p>
</header>

<div class="film-grid">

<div class="film" onclick="openTrailer('Ki4haFrqSrw')">
<img src="yesil-yol.jpg">
<h3>Yeşil Yol</h3>
</div>

<div class="film" onclick="openTrailer('NmzuHjWmXOc')">
<img src="esaret.jpg">
<h3>Esaretin Bedeli</h3>
</div>

<div class="film" onclick="openTrailer('zSWdZVtXT7E')">
<img src="interstellar.jpg">
<h3>Interstellar</h3>
</div>

</div>

<div id="trailerModal" class="modal">
<div class="modal-content">

<span class="close" onclick="closeTrailer()">&times;</span>

<iframe id="trailerFrame" allowfullscreen></iframe>

</div>
</div>

<script>
function openTrailer(videoId){
document.getElementById("trailerModal").style.display="block";
document.getElementById("trailerFrame").src=
"https://www.youtube.com/embed/"+videoId+"?autoplay=1";
}

function closeTrailer(){
document.getElementById("trailerModal").style.display="none";
document.getElementById("trailerFrame").src="";
}
</script>

</body>
</html>
